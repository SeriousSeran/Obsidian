name: Life OS Validation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate Life OS
        run: python 99_System/scripts/life_os.py validate-notes
      - name: Run tests
        run: python -m unittest discover 99_System/tests

