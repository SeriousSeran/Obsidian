name: Inbox Report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 17 * * *" # 23:00 Asia/Colombo

permissions:
  contents: write
  pull-requests: write

jobs:
  inbox-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate inbox report
        run: python 99_System/scripts/inbox_report.py
      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update inbox report"
          title: "Update inbox report"
          body: "Automated safe report. Review and merge if useful."
          branch: automation/inbox-report
          delete-branch: true
