name: Voice Dump Issue Creator
on:
  push:
    paths:
      - '00_Inbox/Voice_Dumps/*.m4a'
      - '00_Inbox/Voice_Dumps/*.mp3'
      - '00_Inbox/Voice_Dumps/*.wav'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for new files and create issues
        run: |
          # Create an issue. The user said issues might be disabled, so we fallback
          gh issue create --title "Transcribe New Voice Dumps" --body "New voice dumps have been added. Please review and transcribe." || echo "Issues disabled or failed, proceeding."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
